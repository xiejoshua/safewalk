services:
  - type: web
    name: safewalk-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      # Live gap-report AI verification + storage. Set the values in the Render
      # dashboard (Environment tab) — they are secrets, not committed here.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
